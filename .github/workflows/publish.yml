name: Publish NuGet Package

on:
  push:
    branches: ["main"]
    paths:
      - "src/Yilduz/Yilduz.csproj"

  workflow_dispatch:

jobs:
  push:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build and Pack
        run: |
          dotnet test
          dotnet pack src\Yilduz\Yilduz.csproj --configuration Release -p:IncludeSymbols=true -p:ContinuousIntegrationBuild=true

      - name: Add private GitHub registry to NuGet
        run: |
          dotnet nuget add source --username Zaitonn --password ${{ secrets.GH_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Zaitonn/index.json"

      - name: Push generated package to GitHub registry and NuGet
        run: |
          dotnet nuget push src\Yilduz\bin\Release\*.symbols.nupkg --skip-duplicate --source "github" --api-key ${{ secrets.GH_TOKEN }}
          dotnet nuget push src\Yilduz\bin\Release\*.symbols.nupkg --skip-duplicate --source "nuget.org" --api-key ${{ secrets.NUGETAPIKEY }}

      - name: Upload package as artifact
        uses: actions/upload-artifact@v6
        with:
          path: src/Yilduz/bin/Release/*.symbols.nupkg
